seed: 1337

system:
  device: cuda

data:
  train_bin: data/tokenized/train.bin
  val_bin: data/tokenized/val.bin
  tokenizer_model: artifacts/tokenizer.model

model:
  vocab_size: 8000
  block_size: 128
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.1
  gradient_checkpointing: true

training:
  batch_size: 2
  grad_accum_steps: 32
  max_steps: 4000
  learning_rate: 0.0003
  min_lr: 0.00003
  warmup_steps: 200
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 200
  eval_iters: 40
  log_interval: 20
  precision: fp16
  compile: false
  checkpoint_dir: checkpoints
  checkpoint_name: tiny_4gb.pt
